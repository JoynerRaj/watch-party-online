services:
  - type: web
    name: watchparty-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:socket_app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.10.0
